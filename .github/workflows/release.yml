name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-sw:
    name: Build desktop app (${{ matrix.platform }} ${{ matrix.args }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            artifact-name: sw-linux
          - platform: windows-latest
            args: ''
            artifact-name: sw-windows
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            artifact-name: sw-macos-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            artifact-name: sw-macos-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: sw/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm install
        working-directory: sw

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: sw
          args: ${{ matrix.args }}

      - name: Stage artifacts
        shell: bash
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          mkdir -p staging
          python3 -c "
          import json, shutil, os
          for p in json.loads(os.environ['ARTIFACT_PATHS']):
              shutil.copy(p, 'staging/')
          "

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: staging/
          if-no-files-found: error

  build-fw:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - uses: Swatinem/rust-cache@v2

      - run: cargo build-fw

      - name: Copy ELF with extension
        run: cp target/thumbv7em-none-eabihf/release/expresso-fw target/thumbv7em-none-eabihf/release/expresso-fw.elf

      - uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: target/thumbv7em-none-eabihf/release/expresso-fw.elf
          if-no-files-found: error

  release:
    name: Release
    needs: [build-sw, build-fw]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: staging
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: staging/*
          draft: false
          prerelease: false
