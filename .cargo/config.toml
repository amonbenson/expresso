[alias]
# Library (expresso crate)
check-lib = ["check", "-p", "expresso"]
build-lib = ["build", "-p", "expresso"]
test-lib = ["test",  "-p", "expresso"]

# Firmware (STM32 target, flashing routed through xtask)
check-fw = ["check", "-p", "expresso-fw", "--target", "thumbv7em-none-eabihf", "--release"]
build-fw = ["build", "-p", "expresso-fw", "--target", "thumbv7em-none-eabihf", "--release"]
flash-fw = ["run", "-p", "xtask", "--", "flash-fw"]

# Desktop software (run via Tauri)
check-sw = ["check", "-p", "expresso-sw"]
build-sw = ["build", "-p", "expresso-sw"]
test-sw = ["test", "-p", "expresso-sw"]
run-sw = ["run", "-p", "xtask", "--", "run-sw"]

# Combined (routed through xtask)
check-all = ["run", "-p", "xtask", "--", "check-all"]
build-all = ["run", "-p", "xtask", "--", "build-all"]
test-all = ["run", "-p", "xtask", "--", "test-all"]

# Tools
cubemx = ["run", "-p", "xtask", "--", "cubemx"]
