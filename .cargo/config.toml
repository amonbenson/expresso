# Firmware commands (STM32 target)
build-fw = ["run", "-p", "xtask", "--", "build-fw"]
check-fw = ["check", "-p", "expresso-fw", "--target", "thumbv7em-none-eabihf"]

# Flash via USB DFU (device must be in DFU mode first: hold BOOT0 high + reset)
flash-fw = ["run", "-p", "xtask", "--", "flash-fw"]

# Open fw/expresso.ioc in STM32CubeMX (reference only, code generation is not used)
cubemx = ["run", "-p", "xtask", "--", "cubemx"]

# Desktop software commands
build-sw = "build -p expresso-sw"
check-sw = "check -p expresso-sw"
run-sw = "run -p expresso-sw"
test-sw = "test -p expresso-sw"

# Check all code
check-all = "check -p expresso-sw && cargo check -p expresso-fw --target thumbv7em-none-eabi"
